name: Keep ML backend warm

# The DokanAI ML backend runs on a free Hugging Face Space, which sleeps
# after ~48h of inactivity. A cold start then takes 30-60s. Pinging
# /health on a schedule keeps the Space awake so users never hit a cold
# start when they open the Analyze page.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space health endpoint
        run: |
          curl -s -m 90 -o /dev/null -w "health: %{http_code}\n" \
            https://bijoynayemhasan-dokanai-ml.hf.space/health || true
