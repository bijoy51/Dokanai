# Local one-command stack for DokanAI.
#
#   cp .env.example .env       # (optional — defaults work for first run)
#   docker compose up --build
#
# Opens:
#   web         -> http://localhost:3000
#   ml-backend  -> http://localhost:7860  (health: /health)
#
# This stack is for local development only. Production lives on Vercel
# (frontend) + Hugging Face Spaces (ml-backend) and is unaffected by this
# file: the Vercel build ignores Dockerfile/docker-compose.yml.

services:
  ml-backend:
    build:
      context: ./ml-backend
    container_name: dokanai-ml-backend
    ports:
      - "7860:7860"
    environment:
      # Must match `ML_ADMIN_SECRET` in the `web` service so the KV store
      # accepts requests from the frontend.
      ADMIN_SECRET: ${ADMIN_SECRET:-local-dev-secret}
      ALLOWED_ORIGINS: "*"
      PORT: "7860"
    # The PyTorch image + model loading takes 10-30s on first boot; give it
    # room before `web` is allowed to start.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: dokanai-web
    ports:
      - "3000:3000"
    environment:
      # Compose service-name DNS — the web container reaches the backend at
      # `http://ml-backend:7860`, not localhost.
      ML_BACKEND_URL: http://ml-backend:7860
      ML_ADMIN_SECRET: ${ADMIN_SECRET:-local-dev-secret}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-auth-secret-change-me}
      # Pilot AI agent (OpenAI). Leave blank to disable; the rest of the app
      # still works, the Pilot tab will just show a "not configured" error.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      ml-backend:
        condition: service_healthy
    restart: unless-stopped
